lm_studio_base_url: http://127.0.0.1:1234
openai_api_key: lm-studio
total_ram_gb: 36
paths:
  plans: ./plans
  database: ./.lao/state.db
memory_gate:
  release_fraction: 0.75
  swap_growth_limit_mb: 512
  settle_timeout_s: 60
  poll_interval_s: 2
orchestration:
  model_load_timeout_s: 180
  max_task_attempts: 3
  plan_watch_interval_s: 10
  llm_request_timeout_s: 300
  llm_retry_attempts: 3
  llm_retry_backoff_base_s: 5
  phase_gated: true
  coder_batch_size: 4
  reviewer_batch_size: 6
  max_context_utilization: 0.85
  quality_gate_mode: standard
  # After you have Package.swift or an .xcodeproj in the per-plan folder, set a real build:
  # validation_build_cmd: xcodebuild -scheme Aether -destination 'platform=iOS Simulator,name=iPhone 16' build
  # validation_lint_cmd: swiftlint lint --strict
  validation_build_cmd: null
  validation_lint_cmd: null
  # When true (default), LAO suggests build/lint from package.json, pyproject.toml, go.mod, etc.
  # when the active profile does not already define kind "build" / "lint" and explicit cmds are unset.
  infer_validation_commands: true
  validation_profile: default
  validation_profiles:
    default:
      commands: []
      block_on_severities: [critical, major]
      block_min_confidence: 0.6
      block_min_confidence_by_analyzer_kind: {}
      block_min_confidence_by_analyzer_id: {}
    swift_ios:
      commands: []
      block_on_severities: [critical, major]
      block_min_confidence: 0.6
      block_min_confidence_by_analyzer_kind: {}
      block_min_confidence_by_analyzer_id: {}
  # Optional host-only security profile (install semgrep / bandit on the machine first):
  # validation_profile: security_host
  # validation_profiles:
  #   security_host:
  #     commands:
  #       - kind: lint
  #         command: semgrep scan --config auto --quiet
  #       - kind: lint
  #         command: bandit -q -r src
  #     block_on_severities: [critical, major]
  #     block_min_confidence: 0.6
  #     block_min_confidence_by_analyzer_kind: {}
  #     block_min_confidence_by_analyzer_id: {}
  placeholder_max_markers_per_kloc: 3.0
  placeholder_max_ratio: 0.02
  preflight_reserved_tokens: 256
  strict_adherence: false
  strict_closure_allowed_statuses: [validated]
  retry_cooldown_base_s: 30
  retry_cap_coder: 3
  retry_cap_reviewer: 3
  retry_cap_validation: 3
  no_progress_repeat_limit: 2
  benchmark_min_pass_rate: 0.85
  benchmark_fail_on_regression: true
  # Set to false (or use --no-analyst) to skip the analyst phase entirely.
  analyst_enabled: true
git:
  enabled: true
  plan_file_name: LAO_PLAN.md
  commit_trailers: false
models:
  planner:
    key: qwen_qwen3.5-35b-a3b
    context_length: 32768
    max_completion: 16384
    supports_tools: true
    size_bytes: 21513639040
    description: Architect / planner
  coder:
    key: qwen/qwen3-coder-30b
    context_length: 16384
    max_completion: 4096
    supports_tools: true
    size_bytes: 17190972664
    description: Coder
  reviewer:
    key: deepseek-r1-distill-qwen-32b
    context_length: 8192
    max_completion: 2048
    supports_tools: false
    size_bytes: 18500000000
    description: Reviewer (DeepSeek R1 Distill Qwen 32B)
  embedder:
    key: text-embedding-nomic-embed-text-v1.5
    context_length: 2048
    max_completion: 0
    supports_tools: false
    size_bytes: 84106624
    description: Embeddings for semantic search
  analyst:
    # Small model with large context for read-only project analysis.
    # Pick a model that leaves ~28 GB free after load so context can be large.
    # Disable with: orchestration.analyst_enabled: false  or  lao run --no-analyst
    key: qwen2.5-7b-instruct
    context_length: 65536
    max_completion: 8192
    supports_tools: false
    size_bytes: 4500000000
    description: Read-only project analyst (large context, small weights)

# ── Reliability & Quality additions (all optional) ──────────────────────

# Tool permission system. Modes: auto | confirm | plan_only | bypass.
# Wildcard rules use Claude-Code syntax: Bash(<glob>), FileWrite(<glob>), …
permissions:
  mode: auto
  allow: []
  deny:
    # - Bash(rm -rf *)
    # - FileWrite(*/secrets/*)

# Skills (named, reusable workflows). Bundled skills always loaded;
# user skills are picked up from any directory listed here plus
# ./.lao/skills (per-project default).
skills_enabled: true
skills_dirs: []

# Hierarchical memory injected as a system-prompt prelude.
memory_enabled: true
memory_project_filename: LAO_MEMORY.md
# memory_user_path: ~/.lao/MEMORY.md   # default

# Conversation compaction: replace the legacy `last 16` trim with a
# system-preserving compactor that summarizes the dropped middle.
compaction_enabled: true
compaction_keep_recent: 8

# Mechanical verifier between coder and reviewer (file existence, AST/JSON
# parse, TODO ledger). Disable to revert to the original pipeline.
verifier_enabled: true

# Reply shape across phases. terse | narrative | json
output_style: narrative

# External MCP servers — discovered tools register as mcp__<server>__<tool>.
mcp_servers: []
  # - name: filesystem
  #   command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/tmp"]

# Optional speculative coder retries inside isolated git worktrees.
# git: { worktrees: false }

# Hooks: pre_tool / post_tool / pre_phase / post_phase.
# hooks:
#   path: ./.lao/hooks.py

# Optional OpenTelemetry exporter.
# otel:
#   enabled: false
#   endpoint: http://localhost:4318/v1/traces
#   service_name: lao
